<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teaching UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="left">
            <div class="input-output-wrapper">
                <textarea id="outputArea" placeholder="Output will appear here" rows="10" cols="50" readonly></textarea>
                <div class="input-section">
                    <div class="input-wrapper">
                        <textarea id="roundedInput" placeholder="Enter text here" rows="4" cols="50" disabled></textarea>
                    </div>
                    <div class="input-buttons">
                        <button id="enterBtn" class="action-btn">Enter</button>
                        <button id="clearBtn" class="action-btn">Clear</button>
                    </div>
                </div>
                <div class="mode-toggle">
                    <button id="modeToggleBtn" class="action-btn">Switch to Light Mode</button>
                </div>
            </div>
        </div>
        <div class="right">
            <div id="set1" class="button-set">
                <h3>Process Mode</h3>
                <button class="option-btn" data-set="1" data-option="1">Word</button>
                <button class="option-btn" data-set="1" data-option="2">Sentence</button>
            </div>
            <div id="set2" class="button-set">
                <h3>Function Mode</h3>
                <button class="option-btn" data-set="2" data-option="1" disabled>Scramble</button>
                <button class="option-btn" data-set="2" data-option="2" disabled>Fill in the blank</button>
            </div>
            <div id="set3" class="button-set">
                <h3>Additional Process Mode</h3>
                <button class="option-btn" data-set="3" data-option="1" disabled>Fill in the blank (percentage)</button>
                <button class="option-btn" data-set="3" data-option="2" disabled>Fill in the blank (word or letter)</button>
                <button class="option-btn" data-set="3" data-option="3" disabled>Fill in the blank (index)</button>
                <button class="option-btn" data-set="3" data-option="4" disabled>Fill in the blank (show first word or letter)</button>
            </div>
        </div>
    </div>
    <script src="handling.js"></script>
</body>
</html>
